<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Yazısı - LetsLead</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-container">
            <a href="index.html" class="logo-link"><img src="logo.png" alt="LetsLead" class="logo-img"></a>
            <button id="hamburger-btn" class="hamburger-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <nav id="main-nav">
                <a href="about.html" class="nav-link" data-i18n="header.about">Hakkımızda</a>
                <a href="index.html#how-it-works" class="nav-link" data-i18n="header.howItWorks">Nasıl Çalışır?</a>
                <a href="contact.html" class="nav-link" data-i18n="footer.contact">İletişim</a>
            </nav>
            <div class="mobile-hide header-actions">
                <a href="contact.html" class="btn btn-primary btn-hover-grow" data-i18n="header.demo">Demo Talep Et</a>
            </div>
        </div>
    </header>

    <main id="post-content-area">
        <div style="minHeight: 60vh; display: flex; justifyContent: center; alignItems: center;">
            <p style="fontSize: 1.25rem; color: var(--color-navy);" id="status-text">Yükleniyor...</p>
        </div>
    </main>

    <footer style="backgroundColor: #ffffff; padding: 4rem 0 2rem; borderTop: 1px solid #e2e8f0;">
        <div class="container" style="textAlign: center; fontWeight: 600;">
            <a href="https://hadisatalim.biz/" target="_blank" style="color: #f39f1c; text-decoration: none;">Hadisatalim.biz</a> &copy; 2020 - 2026
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="main.js"></script>
    <script>
        async function fetchPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const perma = urlParams.get('perma');
            const lang = localStorage.getItem('language') || 'tr';
            const langCode = lang === 'tr' ? 1 : 2;
            const main = document.getElementById('post-content-area');
            const statusText = document.getElementById('status-text');

            if (!perma) {
                main.innerHTML = `<div style="minHeight: 60vh; display: flex; flexDirection: column; justifyContent: center; alignItems: center;">
                    <h2 style="fontSize: 2rem; color: var(--color-navy); marginBottom: 1rem;">${lang === 'tr' ? 'Yazı Bulunamadı' : 'Post Not Found'}</h2>
                    <a href="blog.html" style="color: var(--color-blue); textDecoration: none; fontWeight: 600;">${lang === 'tr' ? '← Bloga Dön' : '← Back to Blog'}</a>
                </div>`;
                return;
            }

            try {
                const response = await fetch('/api/Blog/GetPostByPermaLink?permaLink=' + encodeURIComponent(perma) + '&language=' + langCode, { method: 'POST' });
                if (response.ok) {
                    const post = await response.json();
                    if (!post) throw new Error('Not found');
                    
                    const dateStr = new Date(post.createdDate).toLocaleDateString(lang === 'tr' ? 'tr-TR' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                    const author = post.user && post.user.firstName ? `${post.user.firstName} ${post.user.lastName}` : '';
                    const imageUrl = post.imageUrl || 'https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1920&q=80';

                    main.innerHTML = `
                        <div class="blog-detail-page" style="backgroundColor: #fcfcfc; minHeight: 100vh; paddingBottom: 5rem;">
                            <div class="blog-detail-hero" style="background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(39, 66, 146, 0.9)), url('${imageUrl}'); backgroundSize: cover; backgroundPosition: center; padding: 12rem 2rem 8rem; textAlign: center; color: white; borderBottomLeftRadius: 100px; borderBottomRightRadius: 100px; boxShadow: 0 20px 40px rgba(0,0,0,0.1);">
                                <div style="maxWidth: 900px; margin: 0 auto;">
                                    ${post.category ? `<span style="display: inline-block; backgroundColor: rgba(255,255,255,0.2); padding: 0.6rem 1.75rem; borderRadius: 30px; fontSize: 0.9rem; fontWeight: 700; marginBottom: 2rem; backdropFilter: blur(10px); textTransform: uppercase; letterSpacing: 1px;">${post.category.name}</span>` : ''}
                                    <h1 style="fontSize: 3.5rem; fontWeight: 800; lineHeight: 1.2; marginBottom: 2rem; letterSpacing: -1.5px;">${post.title}</h1>
                                    <div style="display: flex; justifyContent: center; alignItems: center; gap: 2.5rem; opacity: 0.9; fontSize: 1.05rem; fontWeight: 500;">
                                        <span>${author}</span>
                                        <span>${dateStr}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="container" style="maxWidth: 850px; margin: -4rem auto 0; padding: 0 2rem; position: relative; zIndex: 10;">
                                <div style="backgroundColor: white; borderRadius: 32px; padding: 5rem 4rem; boxShadow: 0 30px 60px rgba(0,0,0,0.06); lineHeight: 1.85; color: #334155; fontSize: 1.15rem;" class="blog-content-box">
                                    <a href="blog.html" style="display: inline-flex; alignItems: center; gap: 0.5rem; color: var(--color-blue); textDecoration: none; fontWeight: 700; marginBottom: 3rem; fontSize: 1.05rem;">
                                        ${lang === 'tr' ? '← Bloga Dön' : '← Back to Blog'}
                                    </a>
                                    <div class="blog-html-content">${post.content}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error('Not found');
                }
            } catch (err) {
                main.innerHTML = `<div style="minHeight: 60vh; display: flex; flexDirection: column; justifyContent: center; alignItems: center;">
                    <h2 style="fontSize: 2rem; color: var(--color-navy); marginBottom: 1rem;">${lang === 'tr' ? 'Yazı Bulunamadı' : 'Post Not Found'}</h2>
                    <a href="blog.html" style="color: var(--color-blue); textDecoration: none; fontWeight: 600;">${lang === 'tr' ? '← Bloga Dön' : '← Back to Blog'}</a>
                </div>`;
            }
        }
        window.addEventListener('languageChanged', () => { window.location.href = 'blog.html'; });
        fetchPost();
    </script>
</body>
</html>
